<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame 8</title>
    <link rel="stylesheet" href="assets/css/fonts.css">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" /> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">


    <!-- <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet" /> -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="assets/css/intro.css">


</head>

<body>

    <div class="bg-info relative overflow-hidden">
        <div class="container mx-auto overflow-hidden">
            <div class="grid grid-cols-12">
                <div class="mt-10 lg:mt-16 ml-5 lg:mr-1 col-span-4 lg:col-span-4 ">
                    <img src="assets/images/logo.png" class="h-auto max-w-full" alt="">
                </div>
                <div class=" col-span-12 lg:col-span-6 relative ">
                    <div class=" mt-[80px] md:mt-[146px] lg:mt-[240px] m-[30px] lg:m-5">
                        <h2 class="info-head">What kind of stay do you prefer?</h2>

                        <div class="mt-10 lg:mt-20 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-3 gap-5"
                            id="radio-group">
                            <input type="radio" name="trip" id="fixed" class="hidden peer/fixed" checked>
                            <label for="fixed" class="radio-btn">3 stars</label>

                            <input type="radio" name="trip" id="flexible" class="hidden peer/flexible">
                            <label for="flexible" class="radio-btn">4 stars</label>

                            <input type="radio" name="trip" id="anytime" class="hidden peer/anytime">
                            <label for="anytime" class="radio-btn">5 stars</label>
                        </div>

                      


                        <div class="flex justify-center gap-4 mt-20 items-center">

                            <div
                                class="relative group w-40 h-16 rounded-full overflow-hidden bg-white text-center cursor-pointer">
                                <div
                                    class="absolute inset-0 bg-[#D4B357] translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-in-out z-0">
                                </div>
                                <div
                                    class="relative z-10 text-sky-900 text-2xl font-semibold font-['Poppins'] flex justify-center items-center h-full">
                                    OK
                                </div>
                            </div>


                            <div class=" lg:text-lg font-['Poppins'] text-neutral-300">
                                <span class="font-normal">Or press </span>
                                <span class="font-semibold">Enter</span>
                            </div>
                        </div>


                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>

</html>
